version: "3.9"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
#      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./mosquitto/acl:/mosquitto/config/acl:ro
      - mosq_data:/mosquitto/data
      - mosq_log:/mosquitto/log
    restart: unless-stopped
#    healthcheck:
#      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-p", "1883", "-t", "$SYS/#", "-C", "1"]
#      interval: 10s
#      timeout: 3s
#      retries: 5

  topst:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: topst
#    env_file:
#      - .env
    environment:
#      - MQTT_HOST=127.0.0.1
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      # - MQTT_USER=server
      # - MQTT_PASS=server_pass
    volumes:
      - ./:/app
    ports:
      - "8000:8000"            #
    depends_on:
      mosquitto:
        condition: service_started
    restart: unless-stopped
    command: >
      bash -lc "
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  mosq_data:
  mosq_log:
